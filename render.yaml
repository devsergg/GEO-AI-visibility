services:
  - type: web
    name: geo-command-center-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: BRIGHTDATA_API_TOKEN
        sync: false
      - key: BRIGHTDATA_ZONE
        value: mcp_unlocker
      - key: CHATGPT_DATASET_ID
        value: gd_m7aof0k82r803d5bjm
      - key: PERPLEXITY_DATASET_ID
        sync: false
      - key: GEMINI_DATASET_ID
        value: gd_mbz66arm2mf9cu856y
      - key: GOOGLE_AI_MODE_DATASET_ID
        value: gd_mcswdt6z2elth3zqr2
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "false"
      - key: VECTOR_DB_SUBPROCESS_ENABLED
        value: "false"
      - key: GRAPH_DATABASE_SUBPROCESS_ENABLED
        value: "false"
